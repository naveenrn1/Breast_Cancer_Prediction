<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Breast Cancer Prediction</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f7fc;
        }

        .hero {
            background: linear-gradient(to right, #667eea, #764ba2);

            color: white;

            padding: 50px 0;

            text-align: center;

            margin-bottom: 30px;
        }

        .card {
            border: none;

            border-radius: 15px;

            box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.1);
        }

        .btn-custom {
            background: #667eea;

            color: white;

            font-weight: bold;
        }

        .btn-custom:hover {
            background: #5a67d8;
            color: white;
        }

        .result-box {
            margin-top: 20px;

            padding: 15px;

            border-radius: 10px;

            background: #eef2ff;

            text-align: center;

            font-size: 20px;

            font-weight: bold;
        }
    </style>

</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">

        <div class="container">

            <a class="navbar-brand" href="/">
                Breast Cancer AI
            </a>

            <div>

                <a href="/" class="btn btn-outline-light me-2">
                    Home
                </a>

                <a href="/history" class="btn btn-outline-light me-2">
                    History
                </a>
                <a href="/dashboard" class="btn btn-outline-light me-2">Dashboard</a>
                <a href="/image_predict" class="btn btn-outline-light me-2">Image Predection</a>
                <a href="/result" class="btn btn-outline-light me-2">Result</a>

            </div>

        </div>

    </nav>

    <!-- Hero Section -->

    <div class="hero">

        <div class="container">

            <h1 class="display-4">
                Breast Cancer Prediction System
            </h1>

            <p class="lead">
                AI-powered healthcare prediction using Machine Learning
            </p>

        </div>

    </div>

    <!-- Form Section -->

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-md-8">

                <div class="card p-4">

                    <h3 class="text-center mb-4">
                        Enter Medical Details
                    </h3>

                    <form action="/predict" method="POST">

                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <input type="text" name="radius_mean" class="form-control" placeholder="Radius Mean"
                                    required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <input type="text" name="texture_mean" class="form-control" placeholder="Texture Mean"
                                    required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <input type="text" name="perimeter_mean" class="form-control"
                                    placeholder="Perimeter Mean" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <input type="text" name="area_mean" class="form-control" placeholder="Area Mean"
                                    required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <input type="text" name="smoothness_mean" class="form-control"
                                    placeholder="Smoothness Mean" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <input type="text" name="compactness_mean" class="form-control"
                                    placeholder="Compactness Mean" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <input type="text" name="concavity_mean" class="form-control"
                                    placeholder="Concavity Mean" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <input type="text" name="concave_points_mean" class="form-control"
                                    placeholder="Concave Points Mean" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <input type="text" name="symmetry_mean" class="form-control" placeholder="Symmetry Mean"
                                    required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <input type="text" name="fractal_dimension_mean" class="form-control"
                                    placeholder="Fractal Dimension Mean" required>
                            </div>

                        </div>

                        <div class="d-grid">

                            <button type="submit" class="btn btn-custom btn-lg">
                                Predict Cancer
                            </button>

                        </div>

                    </form>

                    {% if prediction_text %}

                    <div class="result-box">
                        <div> class="text-center mt-3">

                            <a href="/download_report" class="btn btn-success">
                                Download PDF Report
                            </a>

                        </div>

                        {{ prediction_text }}

                    </div>

                    {% endif %}

                </div>

            </div>

        </div>

    </div>

</body>

</html>
