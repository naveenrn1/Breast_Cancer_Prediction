<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Analytics Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f7fc;
        }

        .card {
            border: none;

            border-radius: 15px;

            box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.1);
        }

        .stats-card {
            text-align: center;

            padding: 20px;
        }

        .stats-card h2 {
            font-size: 40px;
        }
    </style>

</head>

<body>

    <nav class="navbar navbar-dark bg-dark">

        <div class="container">

            <a class="navbar-brand" href="/">
                Breast Cancer AI Dashboard
            </a>

            <div>

                <a href="/" class="btn btn-outline-light me-2">
                    Home
                </a>

                <a href="/history" class="btn btn-outline-light">
                    History
                </a>

            </div>

        </div>

    </nav>

    <div class="container mt-5">

        <div class="row">

            <div class="col-md-4">

                <div class="card stats-card">

                    <h5>Total Predictions</h5>

                    <h2>{{ total_predictions }}</h2>

                </div>

            </div>

            <div class="col-md-4">

                <div class="card stats-card">

                    <h5>Benign Cases</h5>

                    <h2>{{ benign_count }}</h2>

                </div>

            </div>

            <div class="col-md-4">

                <div class="card stats-card">

                    <h5>Malignant Cases</h5>

                    <h2>{{ malignant_count }}</h2>

                </div>

            </div>

        </div>

        <div class="row mt-5">

            <div class="col-md-6">

                <div class="card p-4">

                    <h4 class="text-center">
                        Prediction Distribution
                    </h4>

                    <canvas id="pieChart"></canvas>

                </div>

            </div>

            <div class="col-md-6">

                <div class="card p-4">

                    <h4 class="text-center">
                        Prediction Comparison
                    </h4>

                    <canvas id="barChart"></canvas>

                </div>

            </div>

        </div>

    </div>

    <script>
        // pai chart
        const pieCtx = document.getElementById('pieChart');
        new Chart(pieCtx,{
            type:'pie',
            data:{
                labels:["Beigent", 'Malignant'],
                data:[
                    { benign_count }, { malignant_count }
                ],
                backgroundColor:[
                    '#36A2EB',
                    '#FF6384'
                ]
            }
        })
        // bar chat

        const barCtx = document.getElementById('barChat');
        new Chart(barCtx,{
            type:'bar',
            data:{
                labels:['benign', 'malignant'],
                datasets: [{
                    label:'Cases',
                    data:[{ benign_count }, { malignant_count }]
                }],

            }
        })
    </script>

</body>

</html>
