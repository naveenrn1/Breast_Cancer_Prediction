<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Breast Cancer Image Detection</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    >

    <style>

        body {
            background: linear-gradient(to right, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .main-card {
            width: 100%;
            max-width: 650px;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
        }

        .icon-box {
            width: 90px;
            height: 90px;
            background: #f1f3ff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: auto;
            margin-bottom: 20px;
        }

        .icon-box i {
            font-size: 40px;
            color: #6c63ff;
        }

        .title {
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }

        .subtitle {
            text-align: center;
            color: gray;
            margin-bottom: 30px;
        }

        .upload-box {
            border: 2px dashed #6c63ff;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            background: #fafaff;
            transition: 0.3s;
        }

        .upload-box:hover {
            background: #f3f1ff;
        }

        .upload-box input {
            margin-top: 15px;
        }

        .predict-btn {
            background: linear-gradient(to right, #667eea, #764ba2);
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            margin-top: 25px;
            transition: 0.3s;
        }

        .predict-btn:hover {
            transform: scale(1.02);
        }

        .result-box {
            margin-top: 30px;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
        }

        .benign {
            background: #d4edda;
            color: #155724;
        }

        .malignant {
            background: #f8d7da;
            color: #721c24;
        }

    </style>
</head>
<body>

<div class="main-card">

    <div class="icon-box">
        <i class="fa-solid fa-heart-pulse"></i>
    </div>

    <h1 class="title">
        Breast Cancer Image Detection
    </h1>

    <p class="subtitle">
        Upload a medical image to predict whether the tumor is
        Benign or Malignant using AI.
    </p>

    <form
        action="/image_predict"
        method="POST"
        enctype="multipart/form-data"
    >

        <div class="upload-box">

            <h5>
                <i class="fa-solid fa-upload"></i>
                Upload Histopathology Image
            </h5>

            <input
                type="file"
                name="image"
                class="form-control"
                required
            >

        </div>

        <button class="btn btn-primary w-100 predict-btn">
            <i class="fa-solid fa-magnifying-glass"></i>
            Predict From Image
        </button>

    </form>

    {% if prediction %}

        <div class="result-box {% if prediction == 'Benign' %}benign{% else %}malignant{% endif %}">

            Prediction Result: {{ prediction }}

        </div>

    {% endif %}

</div>

</body>
</html>
