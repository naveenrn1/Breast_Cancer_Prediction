<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Prediction Result</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    >

    <style>

        body {
            background: linear-gradient(to right, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .result-card {
            width: 100%;
            max-width: 750px;
            background: white;
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0px 15px 35px rgba(0,0,0,0.25);
            text-align: center;
        }

        .title {
            font-size: 38px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }

        .uploaded-image {
            width: 100%;
            max-width: 350px;
            border-radius: 20px;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.2);
            margin-bottom: 25px;
        }

        .result-box {
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .benign {
            background: #d4edda;
            color: #155724;
        }

        .malignant {
            background: #f8d7da;
            color: #721c24;
        }

        .result-text {
            font-size: 32px;
            font-weight: bold;
        }

        .confidence {
            font-size: 22px;
            margin-top: 10px;
        }

        .btn-custom {
            background: linear-gradient(to right, #667eea, #764ba2);
            border: none;
            padding: 14px 25px;
            font-size: 18px;
            border-radius: 12px;
            transition: 0.3s;
        }

        .btn-custom:hover {
            transform: scale(1.03);
        }

        .icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .benign-icon {
            color: #28a745;
        }

        .malignant-icon {
            color: #dc3545;
        }

    </style>

</head>
<body>

<div class="result-card">

    <h1 class="title">
        AI Prediction Result
    </h1>

    <img
        src="/{{ image_path }}"
        class="uploaded-image"
    >

    <div class="result-box {% if result == 'Benign' %}benign{% else %}malignant{% endif %}">

        {% if result == 'Benign' %}

            <div class="icon benign-icon">
                <i class="fa-solid fa-circle-check"></i>
            </div>

        {% else %}

            <div class="icon malignant-icon">
                <i class="fa-solid fa-triangle-exclamation"></i>
            </div>

        {% endif %}

        <div class="result-text">
            {{ result }}
        </div>

        <div class="confidence">
            Confidence: {{ confidence }}%
        </div>

    </div>

    <a
        href="/image_predict"
        class="btn btn-primary btn-custom"
    >
        <i class="fa-solid fa-arrow-rotate-left"></i>
        Predict Another Image
    </a>

</div>

</body>
</html>
